# Railway config — aplicado cuando el snapshot usa este repo.
# IMPORTANTE: no uses "cd ... &&" aquí. En Docker, Railway puede invocar el start sin shell y
# "cd" no es un ejecutable → "The executable `cd` could not be found".
#
# Servicio API: Root Directory = backend (recomendado). Entonces cwd ya es /app del backend.
# Migraciones: Release Command → node scripts/railway-migrate-deploy.js (desde /app en la imagen).

[build]
builder = "DOCKERFILE"
dockerfilePath = "/backend/Dockerfile"
buildCommand = "npm ci && npm run build"

[deploy]
# Railway V2 uses preDeployCommand; releaseCommand is kept for older project settings.
preDeployCommand = "node scripts/railway-migrate-deploy.js"
releaseCommand = "node scripts/railway-migrate-deploy.js"
startCommand = "npm run start"
healthcheckPath = "/health"
healthcheckTimeout = 720
