# Railway config - Monorepo: deploy desde la raíz del repo.
# https://docs.railway.com/deployments/monorepo
#
# Preferido: en el dashboard, Root Directory = backend y usa backend/Dockerfile o backend/railway.json.
# Si despliegas desde la raíz, este archivo aplica.
#
# No uses migrate en el mismo comando que el servidor: si migrate falla, el proceso nunca escucha y el
# healthcheck falla. Ejecuta migraciones con Railway "Release Command" o un job one-off:
#   cd backend && npx prisma migrate deploy

[build]
buildCommand = "cd backend && npm ci && npm run build"

[deploy]
startCommand = "cd backend && npm run start"
healthcheckPath = "/health"
healthcheckTimeout = 720
